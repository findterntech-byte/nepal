server {
    listen 80;
    server_name jeevika.services www.jeevika.services;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # For testing without SSL, serve directly:
    root /var/www/jeevika;
    index index.html;

    # Frontend - React/Vite
    location / {
        try_files $uri $uri/ /index.html;
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Uploads Folder - Serve static files
    location /uploads/ {
        alias /var/www/jeevika/uploads/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
        
        # Allow common image formats
        location ~* \.(jpg|jpeg|png|gif|webp|pdf|doc|docx|xls|xlsx)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security - Block sensitive files
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|config|ini|log)$ {
        deny all;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Client max body size for uploads
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/jeevika_access.log;
    error_log /var/log/nginx/jeevika_error.log;
}
